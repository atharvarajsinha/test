<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Diabeto | Diabetes Detection</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h1 class="h3 mb-3">Diabetes Detection System</h1>
          <p class="text-muted">Enter patient details to estimate diabetes risk.</p>
          {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
          <form method="post" action="/predict/">
            {% csrf_token %}
            <div class="row g-3">
              {% for feature in features %}
              <div class="col-md-6">
                <label class="form-label">{{ feature }}</label>
                <input type="number" step="any" min="0" class="form-control" name="{{ feature }}" required>
              </div>
              {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary mt-4">Predict</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
